name: Deploy RPG API (Self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-rpg-api-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Deploy production
        env:
          APP_ROOT: /var/www/rpg-api
        run: scripts/deploy-production.sh
